name: Aggiorna News

on:
  push:            # si attiva su ogni push
    paths:
      - 'biography/**'  # solo se cambia qualcosa nella cartella news/
  workflow_dispatch:  # trigger manuale

jobs:
  generate-biography:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false  # importante per usare PAT

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install gray-matter

      - name: Generate biography.json
        run: node generate-biography.js

      - name: Commit & Push changes
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add biography.json
          git diff --cached --quiet || git commit -m "Aggiornamento automatico biography"
          git push https://erpiumino:${{ secrets.PAT }}@github.com/erpiumino/Fabiomassimocapogrosso.git HEAD:main